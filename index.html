<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RR2: Supreme Victory Calc</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #eee; display: flex; justify-content: center; padding: 20px; }
        .calc-card { background: #2d2d2d; padding: 25px; border-radius: 15px; border: 2px solid #d4af37; width: 450px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        input { width: 80px; padding: 5px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; text-align: center; }
        .side-title { color: #5dade2; font-weight: bold; border-bottom: 1px solid #444; margin-bottom: 10px; display: block; }
        .result-area { margin-top: 20px; padding: 15px; background: #1e3d2b; border-radius: 10px; text-align: center; }
        .needed-val { font-size: 24px; color: #2ecc71; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Supreme Victory</h2>

    <span class="side-title">Сторона Победителя (кто ведет)</span>
    <div class="row"><span>Рейтинг (Total Rating):</span><input type="number" id="win_rate" value="1725"></div>
    <div class="row"><span>Героев на клетке:</span><input type="number" id="win_heroes" value="3"></div>
    <div class="row"><span>Набрано черепов:</span><input type="number" id="win_skulls" value="6019"></div>

    <br>
    <span class="side-title" style="color:#e74c3c;">Сторона Проигравшего</span>
    <div class="row"><span>Рейтинг (Total Rating):</span><input type="number" id="lose_rate" value="575"></div>
    <div class="row"><span>Набрано черепов:</span><input type="number" id="lose_skulls" value="0"></div>

    <br>
    <span class="side-title" style="color:#f1c40f;">Время</span>
    <div class="row"><span>Осталось (ч:мин):</span>
        <div>
            <input type="number" id="h" value="13" style="width:40px"> : 
            <input type="number" id="m" value="54" style="width:40px">
        </div>
    </div>

    <div class="result-area">
        Нужно набрать еще:
        <span id="result" class="needed-val">0</span>
    </div>
</div>

<script>
    function update() {
        const K = 22500;
        
        let wRate = parseFloat(document.getElementById('win_rate').value) || 1;
        let wHeroes = parseFloat(document.getElementById('win_heroes').value) || 1;
        let wSkulls = parseFloat(document.getElementById('win_skulls').value) || 0;
        
        let lRate = parseFloat(document.getElementById('lose_rate').value) || 1;
        let lSkulls = parseFloat(document.getElementById('lose_skulls').value) || 0;
        
        let hrs = parseFloat(document.getElementById('h').value) || 0;
        let mins = parseFloat(document.getElementById('m').value) || 0;
        let totalMins = (hrs * 60) + mins;

        // Расчет фактора времени (плавный спад от 16ч до 4ч)
        // 960 мин (16ч) -> 240 мин (4ч)
        let tFactor = 1.0;
        if (totalMins > 240) {
            // Линейная интерполяция между 0.7 и 1.0 в зависимости от времени
            tFactor = 0.7 + (Math.min(totalMins, 960) - 240) / 720 * 0.3;
        } else {
            tFactor = 0.7;
        }

        // Основная формула
        let ratio = lRate / wRate;
        let totalLeadRequired = ratio * (wHeroes * K) * tFactor;
        
        let currentLead = wSkulls - lSkulls;
        let needed = Math.ceil(totalLeadRequired - currentLead);

        document.getElementById('result').innerText = needed > 0 ? needed.toLocaleString() : "SV ГОТОВ!";
    }

    document.querySelectorAll('input').forEach(i => i.oninput = update);
    update();
</script>

</body>
</html>
