<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RR2 Conquest SV Calculator (Modern)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .calculator { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #2c3e50; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .column { width: 48%; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .time-inputs { display: flex; gap: 10px; }
        .time-inputs input { width: 50%; }
        button { width: 100%; padding: 10px; background-color: #e74c3c; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #c0392b; }
        .result-box { margin-top: 20px; padding: 15px; background-color: #ecf0f1; border-radius: 4px; text-align: center; }
        .result-value { font-size: 24px; font-weight: bold; color: #e74c3c; }
        .stats { font-size: 12px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Supreme Victory Calculator</h2>
    
    <div class="row">
        <div class="column">
            <h3>Attacker</h3>
            <label>Heroes</label>
            <input type="number" id="atkHeroes" value="18" min="0">
            <label>Troops</label>
            <input type="number" id="atkTroops" value="8458" min="0">
            <label>Terrain Modifier (Decimal)</label>
            <input type="number" id="atkTerrain" value="1.0" step="0.1" min="0">
            <label>Watchtower Level Base (1.0 - 2.5)</label>
            <input type="number" id="atkTowerBase" value="1.0" step="0.1" min="1.0">
            <label>Tech: Hero Buff (+)</label>
            <select id="atkHeroTech"><option value="0">0</option><option value="5">5</option><option value="10">10</option><option value="15">15</option></select>
            <label>Tech: Troop Buff (+)</label>
            <select id="atkTroopTech"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
            <label>Tech: Tower Buff (%)</label>
            <select id="atkTowerTech"><option value="0">0</option><option value="10">10</option><option value="20">20</option><option value="30">30</option></select>
        </div>
        
        <div class="column">
            <h3>Defender</h3>
            <label>Heroes</label>
            <input type="number" id="defHeroes" value="10" min="0">
            <label>Troops</label>
            <input type="number" id="defTroops" value="4900" min="0">
            <label>Terrain Modifier (Decimal)</label>
            <input type="number" id="defTerrain" value="0.8" step="0.1" min="0">
            <label>Watchtower Level Base (1.0 - 2.5)</label>
            <input type="number" id="defTowerBase" value="1.2" step="0.1" min="1.0">
            <label>Tech: Hero Buff (+)</label>
            <select id="defHeroTech"><option value="0">0</option><option value="5">5</option><option value="10">10</option><option value="15">15</option></select>
            <label>Tech: Troop Buff (+)</label>
            <select id="defTroopTech"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
            <label>Tech: Tower Buff (%)</label>
            <select id="defTowerTech"><option value="0">0</option><option value="10">10</option><option value="20">20</option><option value="30">30</option></select>
        </div>
    </div>

    <hr>
    <h3>Time Remaining</h3>
    <div class="time-inputs">
        <div>
            <label>Hours</label>
            <input type="number" id="timeHours" value="16" min="0" max="24">
        </div>
        <div>
            <label>Minutes</label>
            <input type="number" id="timeMinutes" value="41" min="0" max="59">
        </div>
    </div>

    <button onclick="calculateSV()">Calculate Supreme Victory</button>

    <div class="result-box">
        <div>Required Skull Lead:</div>
        <div class="result-value" id="resultLead">0</div>
        <div class="stats" id="debugStats"></div>
    </div>
</div>

<script>
    function getVal(id) { return parseFloat(document.getElementById(id).value) || 0; }

    function calculateSV() {
        // Constants for Modern Version
        const HERO_BASE = 80;
        const K_CONSTANT = 2000;

        // Fetch inputs
        let hAtk = getVal('atkHeroes'), hDef = getVal('defHeroes');
        let tAtk = getVal('atkTroops'), tDef = getVal('defTroops');
        
        // Calculate Attack Rating
        let atkTowerMod = getVal('atkTowerBase') * (1 + (getVal('atkTowerTech') / 100));
        let atkRating = (hAtk * (HERO_BASE + getVal('atkHeroTech')) + tAtk * (1 + getVal('atkTroopTech'))) * getVal('atkTerrain') * atkTowerMod;

        // Calculate Defense Rating
        let defTowerMod = getVal('defTowerBase') * (1 + (getVal('defTowerTech') / 100));
        let defRating = (hDef * (HERO_BASE + getVal('defHeroTech')) + tDef * (1 + getVal('defTroopTech'))) * getVal('defTerrain') * defTowerMod;

        // Calculate Time Modifier (Modern 16h logic)
        let timeInHours = getVal('timeHours') + (getVal('timeMinutes') / 60);
        let timeMod = 1.0;
        if (timeInHours > 4) {
            timeMod = 1 + 0.75 * (timeInHours - 4);
        }

        // Final Calculation
        let totalHeroes = hAtk + hDef;
        let requiredLead = 0;

        if (atkRating > 0 && defRating > 0) {
            requiredLead = totalHeroes * K_CONSTANT * timeMod * (defRating / atkRating);
        }

        // Update UI
        document.getElementById('resultLead').innerText = Math.round(requiredLead).toLocaleString();
        document.getElementById('debugStats').innerHTML = `AR: ${Math.round(atkRating)} | DR: ${Math.round(defRating)} | TimeMod: ${timeMod.toFixed(3)}`;
    }
    
    // Run once on load to show initial math
    calculateSV();
</script>

</body>
</html>
