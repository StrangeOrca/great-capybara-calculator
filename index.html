<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Великой Капибары</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .calculator { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #2c3e50; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 20px; }
        .column { width: 48%; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Фиолетовая подсветка для новых полей черепов */
        .skull-input { border: 1px solid #9b59b6; background-color: #fcf3ff; }
        
        .time-inputs { display: flex; gap: 15px; margin-bottom: 10px; }
        .time-inputs div { flex: 1; }
        .time-inputs input { width: 100%; }
        
        button { width: 100%; padding: 10px; background-color: #e74c3c; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #c0392b; }
        
        .result-box { margin-top: 20px; padding: 15px; background-color: #ecf0f1; border-radius: 4px; text-align: center; }
        .result-container { display: flex; justify-content: space-around; margin-top: 10px; }
        .result-col { width: 45%; }
        .result-title { font-size: 14px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .result-value-atk { font-size: 24px; font-weight: bold; color: #e74c3c; } 
        .result-value-def { font-size: 24px; font-weight: bold; color: #3498db; } 
        .stats { font-size: 11px; color: #7f8c8d; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Калькулятор Великой Капибары</h2>
    
    <div class="row">
        <div class="column">
            <h3>Атакующий</h3>
            <label style="color: #8e44ad;">Набрано черепов</label>
            <input type="number" id="atkSkulls" class="skull-input" value="276684">
            
            <label>Герои</label>
            <input type="number" id="atkHeroes" value="18" min="0">
            <label>Войска</label>
            <input type="number" id="atkTroops" value="8458" min="0">
            <label>Множитель местности</label>
            <input type="number" id="atkTerrain" value="1.0" step="0.1" min="0">
            
            <label>Технологии: Бафф героев (+)</label>
            <select id="atkHeroTech">
                <option value="0">0</option>
                <option value="5" selected>5</option>
                <option value="10">10</option>
                <option value="15">15</option>
            </select>
            <label>Технологии: Бафф войск (+)</label>
            <select id="atkTroopTech">
                <option value="0" selected>0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>
        
        <div class="column">
            <h3>Защитник</h3>
            <label style="color: #8e44ad;">Набрано черепов</label>
            <input type="number" id="defSkulls" class="skull-input" value="76820">

            <label>Герои</label>
            <input type="number" id="defHeroes" value="10" min="0">
            <label>Войска</label>
            <input type="number" id="defTroops" value="4900" min="0">
            <label>Множитель местности</label>
            <input type="number" id="defTerrain" value="0.8" step="0.1" min="0">
            
            <label>База башни (1.0 - 2.5)</label>
            <input type="number" id="defTowerBase" value="1.44" step="0.01" min="1.0">
            <label>Технологии: Бафф башни (%)</label>
            <select id="defTowerTech">
                <option value="0" selected>0</option>
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
            </select>
            
            <label>Технологии: Бафф героев (+)</label>
            <select id="defHeroTech">
                <option value="0" selected>0</option>
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="15">15</option>
            </select>
            <label>Технологии: Бафф войск (+)</label>
            <select id="defTroopTech">
                <option value="0" selected>0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>
    </div>

    <hr>
    <h3>Оставшееся время</h3>
    <div class="time-inputs">
        <div>
            <label>Часы</label>
            <input type="number" id="timeHours" value="16" min="0" max="24">
        </div>
        <div>
            <label>Минуты</label>
            <input type="number" id="timeMinutes" value="41" min="0" max="59">
        </div>
    </div>

    <button onclick="calculateSV()">Рассчитать</button>

    <div class="result-box">
        <div style="font-weight: bold; color: #333;">Нужно ЕЩЕ черепов для SV:</div>
        <div class="result-container">
            <div class="result-col">
                <div class="result-title">Атакующему</div>
                <div class="result-value-atk" id="resultLeadAtk">0</div>
            </div>
            <div class="result-col" style="border-left: 1px solid #bdc3c7;">
                <div class="result-title">Защитнику</div>
                <div class="result-value-def" id="resultLeadDef">0</div>
            </div>
        </div>
        <div class="stats" id="debugStats"></div>
    </div>
</div>

<script>
    function getVal(id) { return parseFloat(document.getElementById(id).value) || 0; }

    function calculateSV() {
        // Константы, подтвержденные скриншотами
        const HERO_BASE = 75; 
        const TROOP_BASE = 1;
        const K_CONSTANT = 22500; 

        // Рейтинг Атаки
        let hAtk = getVal('atkHeroes'), tAtk = getVal('atkTroops');
        let ar = (hAtk * (HERO_BASE + getVal('atkHeroTech')) + tAtk * (TROOP_BASE + getVal('atkTroopTech'))) * getVal('atkTerrain');

        // Рейтинг Защиты
        let hDef = getVal('defHeroes'), tDef = getVal('defTroops');
        let towerMod = getVal('defTowerBase') * (1 + (getVal('defTowerTech') / 100));
        let dr = (hDef * (HERO_BASE + getVal('defHeroTech')) + tDef * (TROOP_BASE + getVal('defTroopTech'))) * getVal('defTerrain') * towerMod;

        // Множитель времени (16ч -> 4ч)
        let totalMins = (getVal('timeHours') * 60) + getVal('timeMinutes');
        let timeMod = 0.7;
        if (totalMins > 240) {
            timeMod = 0.7 + (Math.min(totalMins, 960) - 240) / 720 * 0.3;
        }

        // Расчет требуемого ЛИДЕРСТВА
        let reqLeadAtk = (dr / ar) * (hAtk * K_CONSTANT) * timeMod;
        let reqLeadDef = (ar / dr) * (hDef * K_CONSTANT) * timeMod;

        // Текущий разрыв
        let curAtkSkulls = getVal('atkSkulls');
        let curDefSkulls = getVal('defSkulls');
        let curLeadAtk = curAtkSkulls - curDefSkulls;
        let curLeadDef = curDefSkulls - curAtkSkulls;

        // Сколько ОСТАЛОСЬ (Требуемое лидерство - Текущее лидерство)
        let finalAtk = Math.max(0, Math.ceil(reqLeadAtk - curLeadAtk));
        let finalDef = Math.max(0, Math.ceil(reqLeadDef - curLeadDef));

        // Вывод
        document.getElementById('resultLeadAtk').innerText = finalAtk.toLocaleString('ru-RU');
        document.getElementById('resultLeadDef').innerText = finalDef.toLocaleString('ru-RU');
        
        document.getElementById('debugStats').innerHTML = 
            `AR: ${Math.round(ar)} | DR: ${Math.round(dr)} | T-Mod: ${timeMod.toFixed(3)}<br>` +
            `Цель (Lead): Аткак ${Math.round(reqLeadAtk).toLocaleString()} | Защ ${Math.round(reqLeadDef).toLocaleString()}`;
    }
    
    calculateSV();
</script>

</body>
</html>
